services:
  app:
    ports:
      - "${APP_PORT}:3000"
    # Pas de volumes bindés, uniquement le système watch de Docker
    develop:
      watch:
        - action: sync
          path: ../
          target: /app
          ignore:
            - node_modules
            - .next
        - action: rebuild
          path: ../package.json
        - action: sync+restart
          path: ../.env
          target: /app/.env

  db:
    ports:
      - "3306:3306"
