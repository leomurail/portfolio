            - paragraph [ref=e131]: Passionné par le développement web, j’ai acquis des compétences solides en HTML, CSS, JavaScript et PHP, SQL, et je connais très bien WordPress. Grâce à mes compétences, je crée des sites web dynamiques et personnalisés, parfaitement adaptés aux besoins spécifiques de chaque personnes. Que ce soit pour la gestion de contenu, l’intégration de fonctionnalités ou la création de sites sur mesure, je suis capable de transformer des idées en solutions digitales efficaces et professionnelles. Avec une approche orientée résultats et une maîtrise des outils modernes, je suis prêt à répondre aux défis les plus ambitieux dans le domaine du web.
          - paragraph [ref=e132]: Développement web
