            - paragraph [ref=e183]: Au cours de ma formation à My Digital School. J’ai appris maîtriser Illustrator et Photoshop, et je perfectionne actuellement mes compétences sur InDesign. J’ai une bonne compréhension des bases du print, telles que l’utilisation de fichiers à 300 dpi, les couleurs CMJN, les fonds perdus, les marges et la gestion des vides. Grâce à cette compétence, je suis capable de créer des visuels imprimés de haute qualité, qu’il s’agisse de brochures, d’affiches ou d’autres supports, tout en respectant les contraintes techniques et les exigences esthétiques du print.
