          - heading "Pourquoi le digital ?" [level=3] [ref=e220]
          - paragraph [ref=e221]: La première raison est que c’est un domaine, dans le cadre de l’entrepreneuriat, qui permet de créer des projets ayant un impact considérable dans notre monde, sans nécessiter des levées de fonds à 1 million d’euros, et offrant un fort potentiel de scalabilité énorme. Ensuite, j’ai toujours aimé travailler sur un ordinateur. Enfin, j’ai développé une véritable passion pour les différents domaines qui composent ce secteur.
        - generic [ref=e222]:
          - heading "Comment j’ai découvert ce domaine ?" [level=3] [ref=e223]
          - paragraph [ref=e224]: "Comme je l’ai mentionné précédemment, j’ai découvert le domaine du digital en cherchant à lancer une application pour résoudre un problème que j’avais au lycée : s’habiller rapidement et efficacement, sans avoir à trop réchercher. Cependant, ce projet s’est avéré bien plus complexe que prévu. Néanmoins, cette expérience m’a permis de développer une véritable passion pour le codage, le design, la création de vidéos et bien d’autres aspects du digital."
