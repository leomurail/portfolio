            - paragraph [ref=e155]: Le web design est une compétence autre compétence que je maîtrise. J’utilise Figma en appliquant l’approche moléculaire pour créer des maquettes cohérentes et efficaces. Je maîtrise l’auto layout pour structurer des interfaces complexes et adaptatives, et j’utilise les composants et variables pour optimiser mes créations. je suis également capable de prototyper des maquettes interactives, offrant ainsi une vision claire de l’expérience utilisateur. Mon approche garantit des designs fonctionnels, esthétiques et adaptés à chaque projet.
