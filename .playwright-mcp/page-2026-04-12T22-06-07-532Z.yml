        - generic [ref=e96]:
          - heading "L'histoire" [level=3] [ref=e97]
          - generic [ref=e98]:
            - paragraph [ref=e99]: Ce rêve de trois lycéens de créer leur propre marque de vêtements a commencé en 2022.
            - paragraph [ref=e100]: Nous voulions révolutionner le monde du streetwear en créant une marque de streetwear premium. Depuis, le projet a évolué de manière significative.
            - paragraph [ref=e101]: Au fil du temps, nous avons commencé à abandonner l’idée de continuer avec la marque en raison de notre manque de sérieux, de connaissances et d’expérience.
            - paragraph [ref=e102]: Cependant, en entrant dans l’enseignement supérieur, j’ai décidé de relancer le projet et de le mener à bien jusqu’au succès.
        - img "image du portfolio de Léo Murail" [ref=e103]
      - generic [ref=e104]:
        - generic [ref=e105]:
          - heading "La vision" [level=3] [ref=e106]
          - generic [ref=e107]:
            - paragraph [ref=e108]: Cliver est bien plus qu’une simple marque de vêtements—c’est un mouvement ancré dans l’auto-évolution.
            - paragraph [ref=e109]: Chaque pièce de Cliver est le reflet de ce parcours, conçue comme une œuvre d’art pour inspirer la croissance.
            - paragraph [ref=e110]: Lorsque vous portez Cliver, vous embrassez la conviction que vous n’êtes pas destiné à des rêves ordinaires. Vous visez à accomplir ce que d’autres jugeraient impossible et aspirez à rêver grand.
            - paragraph [ref=e111]: Malgré le fait d’avoir entendu toute votre vie que vous n’atteindrez peut-être jamais vos objectifs, vous avez confiance en vous et en votre potentiel.
            - paragraph [ref=e112]: "C’est pourquoi notre slogan, « Self Evolution begins », résonne profondément : il rappelle que la véritable transformation commence de l’intérieur."
        - img "image du portfolio de Léo Murail" [ref=e113]
